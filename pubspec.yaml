name: kai_slideshow
description: A fullscreen image slideshow application with context menu and share integration.
publish_to: 'none'
version: 0.4.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^13.0.0  # Oppdatert til nyeste versjon som støtter built-in Kotlin
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
