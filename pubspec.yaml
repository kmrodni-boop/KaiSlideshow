name: kai_slideshow
description: A fullscreen image slideshow application with context menu and share integration.
publish_to: 'none'
version: 0.3.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.19.0" # Require Flutter with AGP 9.0+ support

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^11.0.2
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
