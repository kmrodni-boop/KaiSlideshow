org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Enable the new Android Gradle plugin DSL (required for AGP 9.0+)
android.newDsl=true
# Use built-in Kotlin (AGP 9.0+ has built-in Kotlin support)
android.builtInKotlin=true
# Enable Jetifier for AndroidX compatibility
android.enableJetifier=true
# Use new Gradle variant-aware dependency resolution
android.enableVariantAwareDependencyResolution=true
